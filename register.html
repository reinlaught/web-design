<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація | Web-додаток</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen text-gray-800">

    <header class="bg-blue-600 text-white shadow-md">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold">CalcApp</h1>
            <nav class="space-x-4">
                <a href="index.html" class="hover:text-blue-200">Калькулятор</a>
                <a href="about.html" class="hover:text-blue-200">Про додаток</a>
                <a href="profile.html" class="hover:text-blue-200">Профіль</a>
                <a href="login.html" class="hover:text-blue-200">Вхід</a>
                <a href="register.html" class="bg-blue-800 text-white px-3 py-1 rounded hover:bg-blue-700">Реєстрація</a>
            </nav>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-4 py-8 flex justify-center items-center">
        <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
            <h2 class="text-2xl font-bold text-center mb-6 text-gray-800">Створити акаунт</h2>
            <form action="#" method="POST">
                <div class="mb-4">
                    <label for="name" class="block text-gray-700 font-semibold mb-2">Ім'я</label>
                    <input type="text" id="name" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Ваше ім'я" required>
                </div>
                <div class="mb-4">
                    <label for="email" class="block text-gray-700 font-semibold mb-2">Email</label>
                    <input type="email" id="email" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="your@email.com" required>
                </div>
                <div class="mb-4">
                    <label for="gender" class="block text-gray-700 font-semibold mb-2">Стать</label>
                    <select id="gender" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                        <option value="" disabled selected>Оберіть стать</option>
                        <option value="male">Чоловіча</option>
                        <option value="female">Жіноча</option>
                    </select>
                </div>
                <div class="mb-6">
                    <label for="dob" class="block text-gray-700 font-semibold mb-2">Дата народження</label>
                    <input type="date" id="dob" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>
                <div class="mb-6">
                    <label for="password" class="block text-gray-700 font-semibold mb-2">Пароль</label>
                    <input type="password" id="password" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Створіть пароль" required>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg font-bold hover:bg-blue-700 transition duration-200">Зареєструватися</button>
            </form>
        </div>
    </main>

    <footer class="bg-gray-800 text-gray-300 text-center py-4">
        <p>&copy; 2026 НТУУ КПІ ім. Сікорського. Лабораторна робота №2. Студент групи КВ-32: Клубук Максим</p>
    </footer>

    <script src="js/auth.js"></script>

</body>
</html>
