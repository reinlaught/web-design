<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор | Web-додаток</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen text-gray-800">

    <header class="bg-blue-600 text-white shadow-md">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold">CalcApp</h1>
            <nav class="space-x-4">
                <a href="index.html" class="hover:text-blue-200 underline">Калькулятор</a>
                <a href="about.html" class="hover:text-blue-200">Про додаток</a>
                <a href="profile.html" class="hover:text-blue-200">Профіль</a>
                <a href="login.html" class="hover:text-blue-200">Вхід</a>
                <a href="register.html" class="bg-white text-blue-600 px-3 py-1 rounded hover:bg-gray-100">Реєстрація</a>
            </nav>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-4 py-8 flex justify-center items-center">
        
        <div class="bg-gray-900 p-6 rounded-2xl shadow-xl w-80">
            <div class="bg-gray-100 p-4 rounded-lg mb-4 text-right font-mono flex flex-col justify-end min-h-[5rem]">
                <div id="history-display" class="text-sm text-gray-500 min-h-[1.25rem] mb-1 break-all"></div>
                <div id="main-display" class="text-3xl break-all">0</div>
            </div>
            <div class="flex justify-end mb-3">
                <label class="text-gray-300 text-sm flex items-center cursor-pointer hover:text-white transition">
                    <span class="mr-2">Режим програміста</span>
                    <input type="checkbox" id="prog-mode-toggle" class="w-4 h-4 accent-blue-500 rounded">
                </label>
            </div>
            
            <div id="prog-buttons" class="hidden grid grid-cols-4 gap-3 mb-4 border-b border-gray-700 pb-4">
                <button class="bg-purple-600 hover:bg-purple-700 text-white p-2 rounded-lg font-bold text-sm transition">HEX</button>
                <button class="bg-purple-600 hover:bg-purple-700 text-white p-2 rounded-lg font-bold text-sm transition">DEC</button>
                <button class="bg-purple-600 hover:bg-purple-700 text-white p-2 rounded-lg font-bold text-sm transition">OCT</button>
                <button class="bg-purple-600 hover:bg-purple-700 text-white p-2 rounded-lg font-bold text-sm transition">BIN</button>
            </div>
            <div class="grid grid-cols-4 gap-3">
                <button class="bg-gray-300 hover:bg-gray-400 p-3 rounded-lg font-bold text-xl">AC</button>                
                <button class="bg-gray-300 hover:bg-gray-400 p-3 rounded-lg font-bold text-xl">±</button>
                <button class="bg-gray-300 hover:bg-gray-400 p-3 rounded-lg font-bold text-xl">%</button>
                <button class="bg-orange-500 hover:bg-orange-600 text-white p-3 rounded-lg font-bold text-xl">÷</button>
                
                <button class="bg-white hover:bg-gray-200 p-3 rounded-lg font-bold text-xl">7</button>
                <button class="bg-white hover:bg-gray-200 p-3 rounded-lg font-bold text-xl">8</button>
                <button class="bg-white hover:bg-gray-200 p-3 rounded-lg font-bold text-xl">9</button>
                <button class="bg-orange-500 hover:bg-orange-600 text-white p-3 rounded-lg font-bold text-xl">×</button>
                
                <button class="bg-white hover:bg-gray-200 p-3 rounded-lg font-bold text-xl">4</button>
                <button class="bg-white hover:bg-gray-200 p-3 rounded-lg font-bold text-xl">5</button>
                <button class="bg-white hover:bg-gray-200 p-3 rounded-lg font-bold text-xl">6</button>
                <button class="bg-orange-500 hover:bg-orange-600 text-white p-3 rounded-lg font-bold text-xl">−</button>
                
                <button class="bg-white hover:bg-gray-200 p-3 rounded-lg font-bold text-xl">1</button>
                <button class="bg-white hover:bg-gray-200 p-3 rounded-lg font-bold text-xl">2</button>
                <button class="bg-white hover:bg-gray-200 p-3 rounded-lg font-bold text-xl">3</button>
                <button class="bg-orange-500 hover:bg-orange-600 text-white p-3 rounded-lg font-bold text-xl">+</button>
                
                <button class="bg-white hover:bg-gray-200 p-3 rounded-lg font-bold text-xl col-span-2">0</button>
                <button class="bg-white hover:bg-gray-200 p-3 rounded-lg font-bold text-xl">,</button>
                <button class="bg-orange-500 hover:bg-orange-600 text-white p-3 rounded-lg font-bold text-xl">=</button>
            </div>
        </div>

    </main>

    <footer class="bg-gray-800 text-gray-300 text-center py-4">
        <p>&copy; 2026 НТУУ КПІ ім. Сікорського. Лабораторна робота №2. Студент групи КВ-32: Клубук Максим</p>
    </footer>

    <script src="js/calculator.js"></script>

</body>
</html>
